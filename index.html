<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lee Family Travel Logs</title>
<style>
  :root{ --ink:#3c2d19; --sepia:#7c5a34; --gold:#8a6d3b; --line:#d9c7a6; }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:#efe6d3; color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;
    background-image:radial-gradient(1200px 600px at 50% -10%, #f6efdf 0%, #efe6d3 55%, #e7dcc4 100%);
    min-height:100vh;
  }
  .wrap{ max-width:760px; margin:0 auto; padding:64px 22px 80px; }
  header{ text-align:center; margin-bottom:46px; }
  .kicker{ letter-spacing:.32em; text-transform:uppercase; font-size:13px; color:var(--gold); }
  h1{ font-size:44px; margin:12px 0 8px; font-weight:400; letter-spacing:.01em; }
  .sub{ font-style:italic; color:var(--sepia); font-size:18px; }
  .rule{ width:70px; height:1px; background:var(--line); margin:26px auto 0; }
  a.card{
    display:block; text-decoration:none; color:inherit;
    background:rgba(255,255,255,.45); border:1px solid var(--line); border-radius:12px;
    padding:22px 26px; margin:18px 0;
    box-shadow:0 6px 22px rgba(90,70,40,.08);
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  a.card:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(90,70,40,.16); background:rgba(255,255,255,.7); }
  .eyebrow{ letter-spacing:.22em; text-transform:uppercase; font-size:11px; color:var(--gold); }
  .card h2{ font-size:27px; font-weight:400; margin:6px 0 4px; }
  .card .region{ font-style:italic; color:var(--sepia); font-size:16px; }
  .card .dates{ font-size:14px; color:#6f5c40; margin-top:8px; }
  .card .go{ margin-top:12px; font-size:14px; color:var(--gold); }
  .foot{ text-align:center; margin-top:52px; color:#9a866a; font-size:13px; font-style:italic; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="kicker">Lee Family</div>
      <h1>Travel Logs</h1>
      <div class="sub">A shelf of our trips</div>
      <div class="rule"></div>
    </header>

    <a class="card" href="japan-taiwan-2026.html">
      <div class="eyebrow">Summer 2026</div>
      <h2>Japan &amp; Taiwan</h2>
      <div class="region">Tokyo · Hokkaido · Taipei</div>
      <div class="dates">June 18 – July 18, 2026</div>
      <div class="go">Read the log →</div>
    </a>

    <a class="card" href="europe-2026.html">
      <div class="eyebrow">Spring 2026</div>
      <h2>Europe</h2>
      <div class="region">Paris &amp; Switzerland</div>
      <div class="dates">March 23 – April 7, 2026</div>
      <div class="go">Read the log →</div>
    </a>

    <div class="foot">More trips to come.</div>
  </div>
</body>
</html>
